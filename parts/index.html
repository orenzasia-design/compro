<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OSCARPART Mining Parts Portal</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:white;
padding:20px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
text-align:center;
}

.logo{
height:80px;
margin-bottom:10px;
}

h1{
margin:5px 0;
font-size:28px;
}

.subtitle{
color:#666;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search-box{
width:100%;
padding:14px;
font-size:16px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-bottom:20px;
}

select{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

.stats{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-weight:bold;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.part-number{
font-size:18px;
font-weight:bold;
color:#003366;
}

.desc{
margin-top:6px;
}

.brand{
margin-top:6px;
color:#666;
}

.stock{
margin-top:8px;
font-weight:bold;
}

.available{
color:green;
}

.low{
color:orange;
}

.out{
color:red;
}

</style>
</head>

<body>

<div class="header">

<img
src="../logoorenz.png"
class="logo"
alt="OSCARPART Logo">

<h1>OSCARPART Mining Parts Portal</h1>

<div class="subtitle">
PT. Orenz Suku Cadang Asia Raya
</div>

</div>

<div class="container">

<input
type="text"
id="search"
class="search-box"
placeholder="Search Part Number or Description">

<div class="filters">

<select id="brandFilter">
<option value="">All Brands</option>
</select>

<select id="unitFilter">
<option value="">All Units</option>
</select>

<select id="stockFilter">
<option value="">All Status</option>
<option value="Available">Available</option>
<option value="Low Stock">Low Stock</option>
<option value="Out of Stock">Out of Stock</option>
</select>

</div>

<div class="stats" id="stats">
Loading...
</div>

<div id="results"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
